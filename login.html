<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }

    프로제제
      width: 48px;
      height: 48px;
      background: #4f46e5;
      border-radius: 12px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 28px;
      height: 28px;
      fill: #fff;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      color: #111827;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: #fafafa;
    }

    input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
      background: #fff;
    }

    input.error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.10);
    }

    .error-msg {
      font-size: 13px;
      color: #ef4444;
      margin-top: 5px;
      display: none;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      font-size: 14px;
      color: #374151;
      user-select: none;
    }

    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #4f46e5;
      cursor: pointer;
      padding: 0;
    }

    .forgot {
      font-size: 14px;
      color: #4f46e5;
      text-decoration: none;
      font-weight: 500;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    button[type="submit"] {
      width: 100%;
      padding: 11px;
      background: #4f46e5;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    button[type="submit"]:hover {
      background: #4338ca;
    }

    button[type="submit"]:active {
      transform: scale(0.98);
    }

    button[type="submit"]:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #9ca3af;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .social-btn {
      width: 100%;
      padding: 10px;
      background: #fff;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s, border-color 0.15s;
    }

    .social-btn:hover {
      background: #f9fafb;
      border-color: #9ca3af;
    }

    .signup {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #6b7280;
    }

    .signup a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 500;
    }

    .signup a:hover {
      text-decoration: underline;
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #111827;
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2a5 5 0 1 1 0 10A5 5 0 0 1 12 2zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"/>
    </svg>
  </div>

  <h1>다시 오셨군요!</h1>
  <p class="subtitle">계정에 로그인하세요</p>

  <form id="loginForm" novalidate>
    <div class="form-group">
      <label for="email">이메일</label>
      <input type="email" id="email" name="email" placeholder="example@email.com" autocomplete="email">
      <p class="error-msg" id="emailError">올바른 이메일 주소를 입력하세요.</p>
    </div>

    <div class="form-group">
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" placeholder="비밀번호 입력" autocomplete="current-password">
      <p class="error-msg" id="passwordError">비밀번호를 입력하세요.</p>
    </div>

    <div class="row">
      <label class="remember">
        <input type="checkbox" id="remember"> 로그인 상태 유지
      </label>
      <a href="#" class="forgot">비밀번호 찾기</a>
    </div>

    <button type="submit" id="submitBtn">
      <span id="btnText">로그인</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </form>

  <div class="divider">또는</div>

  <button class="social-btn" type="button" onclick="showToast('Google 로그인은 준비 중입니다.')">
    <svg width="18" height="18" viewBox="0 0 18 18">
      <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
      <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
      <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/>
    </svg>
    Google로 계속하기
  </button>

  <p class="signup">계정이 없으신가요? <a href="#">회원가입</a></p>
</div>

<div class="toast" id="toast"></div>

<script>
  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const emailError = document.getElementById('emailError');
  const passwordError = document.getElementById('passwordError');
  const submitBtn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('spinner');

  function validateEmail(value) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
  }

  function setError(input, errorEl, show) {
    input.classList.toggle('error', show);
    errorEl.style.display = show ? 'block' : 'none';
  }

  emailInput.addEventListener('input', () => {
    if (emailInput.value) setError(emailInput, emailError, !validateEmail(emailInput.value));
  });

  passwordInput.addEventListener('input', () => {
    if (passwordInput.value) setError(passwordInput, passwordError, false);
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const emailVal = emailInput.value.trim();
    const passwordVal = passwordInput.value;

    let valid = true;

    if (!emailVal || !validateEmail(emailVal)) {
      setError(emailInput, emailError, true);
      valid = false;
    } else {
      setError(emailInput, emailError, false);
    }

    if (!passwordVal) {
      setError(passwordInput, passwordError, true);
      valid = false;
    } else {
      setError(passwordInput, passwordError, false);
    }

    if (!valid) return;

    submitBtn.disabled = true;
    btnText.style.display = 'none';
    spinner.style.display = 'block';

    // 로그인 요청 시뮬레이션
    await new Promise(r => setTimeout(r, 1500));

    submitBtn.disabled = false;
    btnText.style.display = 'block';
    spinner.style.display = 'none';

    showToast('로그인에 성공했습니다!');
  });

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }
</script>

</body>
</html>
